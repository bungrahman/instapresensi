<style>
  :root {
    --primary: #10b981;       /* Emerald */
    --primary-hover: #059669;
    --secondary: #64748b;
    --bg-dark: #0f172a;       /* Slate 900 */
    --glass-bg: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-white: #f8fafc;
    --text-dim: #94a3b8;
    --radius: 20px;
    --gradient: linear-gradient(135deg, #10b981, #0ea5e9); /* Emerald to Sky Blue */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    background-image: 
      radial-gradient(at 0% 0%, hsla(167, 80%, 15%, 1) 0, transparent 60%), 
      radial-gradient(at 100% 0%, hsla(199, 89%, 15%, 1) 0, transparent 60%),
      radial-gradient(at 50% 100%, hsla(215, 28%, 15%, 1) 0, transparent 60%);
    color: var(--text-white);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    padding: 1rem;
  }

  .glass-container {
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    width: 100%;
    max-width: 500px;
    padding: 2.5rem 1.5rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.4s ease-out;
  }

  header { text-align: center; margin-bottom: 2.5rem; }
  h1 { 
    font-size: 2.25rem; font-weight: 800; 
    background: var(--gradient); 
    -webkit-background-clip: text; 
    background-clip: text;
    -webkit-text-fill-color: transparent; 
    letter-spacing: -0.05em; 
  }
  #tagline { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; margin-top: 0.25rem;}

  /* 4 PILL BUTTONS GRID */
  .pill-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  .pill {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 40px; 
    padding: 2.2rem 1rem;
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .pill:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-5px);
    border-color: var(--primary);
  }

  .pill:active { transform: scale(0.96); }

  .pill-icon { font-size: 2rem; }
  .pill-text { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }

  /* Specific Pill Accents */
  .btn-in { border-bottom: 3px solid #34d399; } /* Clockin Green */
  .btn-out { border-bottom: 3px solid #fb7185; } /* Clockout Pink/Red */
  .btn-reg { border-bottom: 3px solid #38bdf8; } /* Register Blue */
  .btn-settings { border-bottom: 3px solid #94a3b8; } /* Gray */

  section { display: none; opacity: 0; transform: translateY(15px); transition: 0.4s; }
  section.active { display: block; opacity: 1; transform: translateY(0); }

  h2 { margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 700; color: #e2e8f0; text-align: center; }
  p { margin-bottom: 1.5rem; color: var(--text-dim); line-height: 1.5; text-align: center;}

  input, select, .input-large {
    width: 100%; padding: 1rem; margin-bottom: 1rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border); border-radius: 14px;
    color: white; font-size: 1rem; transition: 0.2s;
  }
  input:focus, select:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); outline: none; }
  select option { background: var(--bg-dark); color: var(--text-white); }
  label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); }

  .form-grid { display: flex; flex-direction: column; }

  .actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .btn { 
    flex: 1; padding: 1.1rem; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-transform: uppercase;
  }
  .btn-primary { background: var(--gradient); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
  .btn-back { background: transparent; border: 1px solid var(--glass-border); color: var(--text-dim); }
  .btn-secondary { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--glass-border); }
  .btn-scan { 
    background: linear-gradient(135deg, #f59e0b, #d97706); color: white; 
    border: none; border-radius: 14px; padding: 1rem; margin-top: 0.5rem;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s;
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-scan:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }

  .location-status {
    background: rgba(0, 0, 0, 0.2); border-radius: 8px; padding: 10px; text-align: center;
    font-size: 0.85rem; margin-bottom: 1rem; border: 1px dashed var(--glass-border);
  }

  .photo-capture-area {
    position: relative; width: 100%; aspect-ratio: 3/4;
    background: #000; border-radius: var(--radius); overflow: hidden;
    margin-bottom: 1rem; border: 1px solid var(--glass-border);
  }
  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255, 255, 255, 0.02);
  }
  .placeholder-icon { font-size: 4rem; margin-bottom: 1rem; animation: pulse 2s ease-in-out infinite; }
  .photo-result { width: 100%; height: 100%; object-fit: cover; }
  .btn-snap { background: linear-gradient(135deg, #34d399, #059669); color: white; font-size: 1rem; }

  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .badge {
    background: white; color: #0f172a; padding: 2rem 1rem; border-radius: 16px;
    text-align: center; margin-top: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
  }
  .badge::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: linear-gradient(90deg, #10b981, #0ea5e9);
  }
  .badge-company { font-weight: 700; font-size: 0.9rem; color: #0ea5e9; margin-bottom: 0.2rem; }
  .badge-header { font-weight: 800; font-size: 0.65rem; color: var(--primary); letter-spacing: 0.2em; margin-bottom: 1rem; }
  .badge-id { font-size: 1.75rem; font-weight: 900; margin-bottom: 0.5rem; }
  .badge-name { font-size: 1rem; font-weight: 600; color: #334155; margin-bottom: 0.2rem; }
  .badge-date { font-size: 0.8rem; color: #94a3b8; }
  .qr { margin: 1.5rem auto; width: 150px; height: 150px; }
  .qr img { width: 100%; height: 100%; }
  
  .badge-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .btn-download { background: #10b981; color: white; flex: 1; padding: 0.75rem; font-size: 0.9rem; border-radius: 12px; }

  .success-icon { font-size: 4rem; text-align: center; animation: pulse 2s ease-in-out infinite;}

  .loader-overlay {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
    z-index: 100; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 24px;
  }
  .spinner {
    width: 48px; height: 48px; border: 4px solid var(--glass-border);
    border-top: 4px solid var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 1rem;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  @media (min-width: 600px) {
    .glass-container { max-width: 550px; padding: 3rem 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    input, select { margin-bottom: 0px; }
  }
</style>
